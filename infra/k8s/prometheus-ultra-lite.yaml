# Ultra-light configuration for small clusters
prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 3d
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
    storageSpec: {}
    
  serviceMonitorSelectorNilUsesHelmValues: false
  podMonitorSelectorNilUsesHelmValues: false

grafana:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  adminPassword: admin123
  persistence:
    enabled: false
  
  # Désactiver les dashboards par défaut
  defaultDashboardsEnabled: false

kube-state-metrics:
  enabled: false

node-exporter:
  enabled: false

alertmanager:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    enabled: true

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

coreDns:
  enabled: true
  serviceMonitor:
    enabled: true

kubeEtcd:
  enabled: false

# Désactiver les prometheusRules par défaut
defaultRules:
  create: false
