# Récupérer le mot de passe RDS depuis Terraform
# (Vous devriez l'avoir dans votre fichier prod.tfvars)

# Créer les secrets pour production
kubectl create secret generic backend-secrets \
  --namespace=production \
  --from-literal=DB_PASSWORD='VOTRE_MOT_DE_PASSE_RDS' \
  --from-literal=JWT_SECRET='generer-un-secret-aleatoire-32-caracteres' \
  --from-literal=API_KEY='votre-api-key' \
  --dry-run=client -o yaml | kubectl apply -f -

# Créer les secrets pour staging
kubectl create secret generic backend-secrets \
  --namespace=staging \
  --from-literal=DB_PASSWORD='VOTRE_MOT_DE_PASSE_RDS_STAGING' \
  --from-literal=JWT_SECRET='secret-staging-different' \
  --dry-run=client -o yaml | kubectl apply -f -