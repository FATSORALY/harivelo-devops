apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: harivelo-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
  - name: harivelo-business.rules
    interval: 30s
    rules:
    - record: daily_active_users
      expr: sum(increase(active_users_total[24h]))
      labels:
        metric_type: business
        
    - record: revenue_total
      expr: sum(increase(revenue_euros_total[1h]))
      labels:
        metric_type: business
        
    - record: conversion_rate
      expr: (sum(transactions_total) / sum(visitors_total)) * 100
      labels:
        metric_type: business
        
  - name: harivelo-sla.rules
    interval: 1m
    rules:
    - record: sla_availability
      expr: (sum(up{job="backend"}) / count(up{job="backend"})) * 100
      labels:
        metric_type: sla
        
    - record: sla_latency_p95
      expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))
      labels:
        metric_type: sla
        
  - name: harivelo-alerts
    interval: 30s
    rules:
    - alert: SLAViolation
      expr: sla_availability < 99.9
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "SLA violation detected"
        description: "Availability is {{ $value }}% (below 99.9%)"
        
    - alert: BusinessMetricAnomaly
      expr: abs(deriv(daily_active_users[1h])) > 100
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Unusual business metric variation"
        description: "Active users changed by {{ $value }} in the last hour"
